name: Diagnose live sector and timing tabs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "app/api/fund-intelligence/**"
      - "lib/fallback-sources.js"
      - "lib/fallback-momentum-fast.js"
      - "lib/official-portfolio.js"
      - "lib/resolve-research-documents.js"
      - "lib/normalize-research-history.js"
      - ".github/workflows/diagnose-live-tabs.yml"

permissions:
  contents: write

concurrency:
  group: diagnose-live-tabs
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        id: install
        continue-on-error: true
        run: npm install --no-audit --no-fund > /tmp/install.log 2>&1
      - name: Build
        id: build
        continue-on-error: true
        run: npm run build > /tmp/build.log 2>&1
      - name: Start app
        id: start
        if: steps.build.outcome == 'success'
        continue-on-error: true
        run: |
          npm start > /tmp/managerlens-server.log 2>&1 &
          echo $! > /tmp/managerlens-server.pid
          for i in {1..60}; do
            if curl -fsS 'http://127.0.0.1:3000/api/universe?view=managers' >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1
      - name: Exercise live fund intelligence
        if: steps.start.outcome == 'success'
        continue-on-error: true
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs/promises';
          const base = 'http://127.0.0.1:3000';
          const queries = [
            'HDFC Flexi Cap',
            'Parag Parikh Flexi Cap',
            'SBI Small Cap',
            'ICICI Prudential Balanced Advantage',
            'Kotak Emerging Equity',
            'Axis Bluechip'
          ];
          const report = { generatedAt: new Date().toISOString(), node: process.version, tests: [] };
          async function getJson(url) {
            const response = await fetch(url, { headers: { accept: 'application/json' } });
            const text = await response.text();
            let body;
            try { body = JSON.parse(text); } catch { body = { raw: text.slice(0, 4000) }; }
            return { status: response.status, body };
          }
          for (const query of queries) {
            const universe = await getJson(`${base}/api/universe?view=funds&q=${encodeURIComponent(query)}&limit=5&offset=0`);
            const fund = universe.body?.results?.[0];
            const test = { query, universeStatus: universe.status, fund: fund ? { id: fund.id, displayName: fund.displayName, fundHouse: fund.fundHouse, preferredSchemeCode: fund.preferredSchemeCode } : null };
            if (!fund) {
              test.error = universe.body?.error || universe.body?.detail || 'No fund result';
              report.tests.push(test);
              continue;
            }
            const intelligence = await getJson(`${base}/api/fund-intelligence?fundId=${encodeURIComponent(fund.id)}&schemeCode=${encodeURIComponent(fund.preferredSchemeCode)}&diagnostic=${Date.now()}`);
            const body = intelligence.body || {};
            test.intelligenceStatus = intelligence.status;
            test.intelligenceOk = body.ok;
            test.engineVersion = body.engineVersion;
            test.error = body.error || body.detail || null;
            test.sourceDiagnostics = body.sourceDiagnostics || body.diagnostics || null;
            test.sources = body.sources?.map(source => ({ name: source.name, type: source.type, url: source.url })) || [];
            test.counts = {
              managers: body.managers?.length || 0,
              holdings: body.holdings?.length || 0,
              sectors: body.sectors?.length || 0,
              entries: body.entries?.length || 0,
              exits: body.exits?.length || 0,
              snapshotCount: body.coverage?.snapshotCount || 0,
              factorCoverage: body.coverage?.resolvedPct || 0
            };
            test.snapshot = body.snapshot ? {
              factsheetLabel: body.snapshot.factsheetLabel,
              sectorBasis: body.snapshot.sectorBasis,
              currentAsOf: body.snapshot.currentAsOf,
              previousAsOf: body.snapshot.previousAsOf,
              comparisonMode: body.snapshot.comparisonMode,
              sectorWeights: body.snapshot.sectorWeights?.slice(0, 5) || []
            } : null;
            test.failures = body.officialPortfolioFailures || [];
            report.tests.push(test);
          }
          await fs.writeFile('data/live-tabs-diagnostics.json', JSON.stringify(report, null, 2));
          console.log(JSON.stringify(report, null, 2));
          NODE
      - name: Preserve diagnostic logs
        if: always()
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs/promises';
          let report = {};
          try { report = JSON.parse(await fs.readFile('data/live-tabs-diagnostics.json', 'utf8')); } catch {}
          async function read(path) { try { return (await fs.readFile(path, 'utf8')).slice(-16000); } catch { return ''; } }
          report.workflow = {
            generatedAt: new Date().toISOString(),
            install: '${{ steps.install.outcome }}',
            build: '${{ steps.build.outcome }}',
            start: '${{ steps.start.outcome }}',
            installLog: await read('/tmp/install.log'),
            buildLog: await read('/tmp/build.log'),
            serverLog: await read('/tmp/managerlens-server.log')
          };
          await fs.writeFile('data/live-tabs-diagnostics.json', JSON.stringify(report, null, 2));
          NODE
      - name: Commit diagnostics
        if: always()
        run: |
          git config user.name "managerlens-diagnostics"
          git config user.email "managerlens-diagnostics@users.noreply.github.com"
          git add data/live-tabs-diagnostics.json
          if git diff --cached --quiet; then
            echo "No diagnostic changes"
            exit 0
          fi
          git commit -m "Capture live sector and timing diagnostics"
          git push
