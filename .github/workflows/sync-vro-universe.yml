name: Sync Value Research universe

on:
  workflow_dispatch:
  schedule:
    - cron: "40 2 * * 1,4"
  push:
    branches: [main]
    paths:
      - "scripts/sync-vro-universe.mjs"
      - ".github/workflows/sync-vro-universe.yml"
      - "package.json"

permissions:
  contents: write

concurrency:
  group: sync-vro-universe
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-audit --no-fund
      - run: npm run sync:vro
      - name: Commit updated public research universe
        run: |
          if git diff --quiet -- data/vro-universe.generated.js; then
            echo "No Value Research universe changes"
            exit 0
          fi
          git config user.name "managerlens-bot"
          git config user.email "managerlens-bot@users.noreply.github.com"
          git add data/vro-universe.generated.js
          git commit -m "Refresh Value Research manager and fund universe"
          git push
