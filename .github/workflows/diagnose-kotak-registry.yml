name: Diagnose Kotak research aliases

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/diagnose-kotak-registry.yml"

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Inspect generated registry
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs/promises';
          import { VRO_FUND_INTELLIGENCE } from './data/vro-universe.generated.js';
          const rows = Object.entries(VRO_FUND_INTELLIGENCE)
            .filter(([key, value]) => {
              const text = `${key} ${value?.current?.valueResearch?.fundName || ''}`.toLowerCase();
              return text.includes('kotak') && (text.includes('midcap') || text.includes('mid cap') || text.includes('emerging equity'));
            })
            .map(([key, value]) => ({
              key,
              fundName: value?.current?.valueResearch?.fundName,
              url: value?.current?.valueResearch?.url,
              holdings: value?.current?.valueResearch?.holdings?.slice(0, 10) || [],
              managers: value?.current?.valueResearch?.managers || []
            }));
          await fs.writeFile('data/kotak-registry-diagnostics.json', JSON.stringify({ generatedAt: new Date().toISOString(), rows }, null, 2));
          console.log(JSON.stringify(rows, null, 2));
          NODE
      - name: Commit results
        run: |
          git config user.name "managerlens-diagnostics"
          git config user.email "managerlens-diagnostics@users.noreply.github.com"
          git add data/kotak-registry-diagnostics.json
          git commit -m "Capture Kotak research alias diagnostics" || exit 0
          git pull --rebase origin main
          git push
