name: Sync manager universe

on:
  workflow_dispatch:
  schedule:
    - cron: "25 3 * * 1"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run sync:managers
      - name: Commit updated registry
        run: |
          if git diff --quiet -- data/manager-registry.generated.js; then
            echo "No registry changes"
            exit 0
          fi
          git config user.name "managerlens-bot"
          git config user.email "managerlens-bot@users.noreply.github.com"
          git add data/manager-registry.generated.js
          git commit -m "Refresh official AMC manager registry"
          git push
